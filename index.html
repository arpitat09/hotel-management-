<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Hotel Management System</h1>
        
        <h2>Available Rooms</h2>
        <table id="rooms-table">
            <thead>
                <tr>
                    <th>Room Number</th>
                    <th>Type</th>
                    <th>Price</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <h2>Create Booking</h2>
        <form id="booking-form">
            <label for="room_id">Room:</label>
            <select id="room_id" name="room_id" required></select><br>
            <label for="guest_name">Guest Name:</label>
            <input type="text" id="guest_name" name="guest_name" required><br>
            <div id="second-guest-container" style="display: none;">
                <label for="second_guest_name">Second Guest Name:</label>
                <input type="text" id="second_guest_name" name="second_guest_name" required><br>
            </div>
            <label for="check_in">Check-in Date:</label>
            <input type="date" id="check_in" name="check_in" required><br>
            <label for="check_out">Check-out Date:</label>
            <input type="date" id="check_out" name="check_out" required><br>
            <button type="submit">Book Room</button>
        </form>

        <h2>Current Bookings</h2>
        <table id="bookings-table">
            <thead>
                <tr>
                    <th>Guest Name</th>
                    <th>Second Guest Name</th>
                    <th>Room Number</th>
                    <th>Check-in</th>
                    <th>Check-out</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
